# --- LICA specific parameters ---

action_selector: "gumbel"
epsilon_start: .5
epsilon_finish: .01
epsilon_anneal_time: 200000
mask_before_softmax: True # set to True for entropy regularization

runner: "parallel"

buffer_size: 10
batch_size_run: 10
batch_size: 10

td_lambda: 0.8
hidden_dim: 128
# update the target network every {} training steps
target_update_interval: 200
lr: 0.0005 # Learning rate for agents
critic_lr: 0.001 # Learning rate for critics
use_rnn: True
# use lica
agent_output_type: "pi_logits"
learner: "lica_learner"
mixing_embed_dim: 64
hypernet_layers: 2
entropy_coef: 0.03 #0.11 # 0.03 for 3s5z_vs_3s6z, 0.06 for all others

name: "lica"
t_max: 10050000